<div class="password-input" style="position: relative;">
    <input
        type="password"
        name="{{ pw_input_name }}"
        placeholder="{{ pw_input_placeholder }}"
        autocomplete="{{ pw_input_autocomplete }}"
        style="padding-right: 3rem; margin-bottom: 0;"
        {% if pw_input_required %}required{% endif %}
    >
    <button
        type="button"
        onclick="togglePasswordFieldForButton(this)"
        aria-label="Toggle password visibility"
        style="position: absolute; right: 0.5rem; top: 0; bottom: 0; background: none; border: none; cursor: pointer; color: var(--pico-muted-color); padding: 0; width: 1.5rem; display: flex; align-items: center; justify-content: center; margin: 0;"
    >
        <i class="fas fa-eye"></i>
    </button>
</div>
