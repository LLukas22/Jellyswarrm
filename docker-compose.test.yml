##############################################################
# Jellyswarrm - Direct Play Fix Test Stack
# Branch: fix/playbackinfo-direct-play
# Repo:   https://github.com/DemonFiend/Jellyswarrm
#
# Pre-build the image on the server first:
#   docker build -t jellyswarrm:fix-directplay \
#     https://github.com/DemonFiend/Jellyswarrm.git#fix/playbackinfo-direct-play
# Then deploy this stack in Portainer.
##############################################################

services:
  jellyswarrm:
    image: jellyswarrm:fix-directplay
    pull_policy: never
    container_name: jellyswarrm
    restart: unless-stopped
    ports:
      - "31235:3000"
    volumes:
      - ./data:/app/data
    environment:
      - RUST_LOG=jellyswarrm_proxy=debug
      - JELLYSWARRM_USERNAME=admin
      - JELLYSWARRM_PASSWORD=changeme
